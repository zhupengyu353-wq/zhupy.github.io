<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<title>DS手柄测试</title>
<style>
body{
background: #1a1a1a;
color: white;
font-family: Arial;
padding: 20px;
margin: 0;
}

.controller-preview {
position: relative;
width: 850px; 
height: 650px;
margin: 40px auto;
background: #333;
}

.svg-part {
position: absolute;
pointer-events: none;
transform: scale(60%);
transform-origin: top left;
}

.controller{
display: flex;
gap: 30px;
margin: 0 auto 20px;
justify-content: center;
align-items: center;
width: 100%;
max-width: 600px;
}

.stick{
width: 150px;
height: 150px;
border: 2px solid #666;
border-radius: 50%;
position: relative;
background: #222;
}

.stick-point{
width: 20px;
height: 20px;
background: #0f0;
border-radius: 50%;
position: absolute;
top: 50%;
left: 50%;
transform: translate(-50%,-50%);
}

.button{
padding: 10px;
margin: 5px;
background: #333;
display: inline-block;
border-radius: 6px;
min-width: 40px;
text-align: center;
}
.button.pressed{
background: #0f0;
color: black;
}

.key-shape {
fill: none;
stroke: #000;
stroke-width: 2;
transition: fill 0.1s;
}

.stick-on .key-shape {
fill: #000 !important;
stroke: #000 !important;
}

#key_l3, #key_r3 {
transition: transform 0.05s linear;
}

.img-pressed {
filter: drop-shadow(0 0 12px #0ff) brightness(1.4);
}

/* 扳机进度条样式 */
.trigger-bar {
  width: 200px;
  height: 10px;
  background: #444;
  border-radius: 5px;
  margin: 5px 0 5px;
  overflow: hidden;
}
.trigger-fill {
  height: 100%;
  background: #0ff;
  width: 0%;
  transition: width 0.05s linear;
}
.trigger-box {
  text-align: center;
  margin: 0 10px;
}
.triggers {
  display: flex;
  justify-content: center;
  gap: 30px;
  margin: 10px auto;
}
.trigger-value {
  font-size: 14px;
  color: #ccc;
  height: 20px;
}

/* 摇杆数值显示 */
.stick-info {
  margin-top: 8px;
  font-size: 14px;
  color: #ccc;
  line-height: 1.4;
}
</style>
</head>

<!-- 触摸板图片 -->
<img src="触摸板.svg" class="svg-part" id="key_touch" style="left:295px; top:190px;">

<!-- 双指触摸点（自动定位） -->
<div id="touch1" style="position:absolute; width:12px; height:12px; background:red; border-radius:50%; display:none; z-index:10;"></div>
<div id="touch2" style="position:absolute; width:12px; height:12px; background:blue; border-radius:50%; display:none; z-index:10;"></div>

<img src="扬声器.svg" class="svg-part" id="key_ps" style="left:390px; top:345px;">
<img src="麦克风.svg" class="svg-part" id="key_mc" style="left:402px; top:435px;">
</div>

<div class="controller">
  <div>
    <h3>左摇杆</h3>
    <div class="stick">
      <div class="stick-point" id="pointL"></div>
    </div>
    <div class="stick-info" id="l-stick-info">X:0.00  Y:0.00</div>
  </div>
  <div>
    <h3>右摇杆</h3>
    <div class="stick">
      <div class="stick-point" id="pointR"></div>
    </div>
    <div class="stick-info" id="r-stick-info">X:0.00  Y:0.00</div>
  </div>
</div>

<script>
// ======================
//  WebSocket 连接 Python 后端，接收双指触摸坐标
// ======================
const ws = new WebSocket("ws://" + window.location.host + "/ws");

const touch1 = document.getElementById("touch1");
const touch2 = document.getElementById("touch2");

// 触摸板在网页上的左上角位置
const padLeft = 295;
const padTop = 190;

// DS5 真实坐标范围
const realW = 1920;
const realH = 1080;

// 你触摸板图片的显示大小
const displayW = 260;
const displayH = 140;

ws.onmessage = function (e) {
    const data = JSON.parse(e.data);

    // 手指1 红点
    if (data.touch1) {
        touch1.style.display = "block";
        let x = padLeft + (data.x1 / realW * displayW);
        let y = padTop + (data.y1 / realH * displayH);
        touch1.style.left = x + "px";
        touch1.style.top = y + "px";
    } else {
        touch1.style.display = "none";
    }

    // 手指2 蓝点
    if (data.touch2) {
        touch2.style.display = "block";
        let x = padLeft + (data.x2 / realW * displayW);
        let y = padTop + (data.y2 / realH * displayH);
        touch2.style.left = x + "px";
        touch2.style.top = y + "px";
    } else {
        touch2.style.display = "none";
    }
};

// ======================
//  你原来的手柄逻辑（不动）
// ======================
const keyMap = {
0:'cross',1:'circle',2:'square',3:'triangle',
4:'l1',5:'r1',6:'l2',7:'r2',
8:'share',9:'option',10:'l3',11:'r3',
12:'up',13:'down',14:'left',15:'right',
16:'ps',17:'touch',18:'mc'
};

const l3 = document.getElementById('key_l3');
const r3 = document.getElementById('key_r3');
const l2Fill = document.getElementById('l2-fill');
const r2Fill = document.getElementById('r2-fill');
const l2Val = document.getElementById('l2-val');
const r2Val = document.getElementById('r2-val');
const lStickInfo = document.getElementById('l-stick-info');
const rStickInfo = document.getElementById('r-stick-info');

setInterval(updateGamepad, 16);

function updateGamepad(){
const gamepads = navigator.getGamepads();
if(!gamepads) return;
const pad = gamepads[0];
if(!pad) return;

updateButtons(pad.buttons);
updateSticks(pad.axes, pad.buttons);
updateTriggers(pad);
updatePadVisual(pad.buttons);
}

function updateButtons(buttons){
const container = document.getElementById('buttons');
container.innerHTML = '';
for(let i=0; i<=18; i++) {
const btn = buttons[i];
const el = document.createElement('div');
el.className = 'button' + (btn?.pressed ? ' pressed':'');

const names = {
  0: 'X',
  1: 'O',
  2: '▢',
  3: '△',
  4: 'L1',
  5: 'R1',
  6: 'L2',
  7: 'R2',
  8: 'SHARE',
  9: 'OPTION',
  10: 'L3',
  11: 'R3',
  12: '↑',
  13: '↓',
  14: '←',
  15: '→',
  16: 'PS',
  17: 'TOUCH',
  18: 'MIC'
};
el.textContent = names[i] || i;
container.appendChild(el);
}
}

function updateSticks(axes, buttons){
const lx = axes[0] || 0;
const ly = axes[1] || 0;
const rx = axes[2] || 0;
const ry = axes[3] || 0;

setStick('pointL', lx, ly);
setStick('pointR', rx, ry);

// 显示摇杆坐标
lStickInfo.textContent = `X:${lx.toFixed(5)}  Y:${ly.toFixed(5)}`;
rStickInfo.textContent = `X:${rx.toFixed(5)}  Y:${ry.toFixed(5)}`;

const maxOffset = 25;
l3.style.transform = `scale(60%) translate(${lx * maxOffset}px, ${ly * maxOffset}px)`;
r3.style.transform = `scale(60%) translate(${rx * maxOffset}px, ${ry * maxOffset}px)`;

const lActive = (Math.abs(lx) > 0.1 || Math.abs(ly) > 0.1 || buttons[10]?.pressed);
const rActive = (Math.abs(rx) > 0.1 || Math.abs(ry) > 0.1 || buttons[11]?.pressed);

l3.classList.toggle('stick-on', lActive);
r3.classList.toggle('stick-on', rActive);
}

function setStick(id, x, y){
const p = document.getElementById(id);
p.style.left = 50 + x*50 + '%';
p.style.top  = 50 + y*50 + '%';
}

// 扳机进度条 + 数值更新
function updateTriggers(pad) {
  const l2 = pad.buttons[6]?.value || 0;
  const r2 = pad.buttons[7]?.value || 0;
  l2Fill.style.width = (l2 * 100) + '%';
  r2Fill.style.width = (r2 * 100) + '%';
  l2Val.textContent = l2.toFixed(3);
  r2Val.textContent = r2.toFixed(3);
}

function updatePadVisual(buttons) {
document.querySelectorAll('.key-shape').forEach(path => {
path.style.fill = "none";
path.style.stroke = "#000";
});
document.querySelectorAll('#key_ps,#key_touch,#key_mc').forEach(i=>i.classList.remove('img-pressed'));

buttons.forEach((btn,i)=>{
if(!btn?.pressed) return;
const kn = keyMap[i];
const el = document.getElementById('key_'+kn);
if(!el) return;

const path = el.querySelector('.key-shape');
if(path){
switch(kn){
case 'cross': path.style.fill='#f55'; break;
case 'circle': path.style.fill='#55f'; break;
case 'square': path.style.fill='#ff5'; break;
case 'triangle': path.style.fill='#5f5'; break;
case 'up': case 'down': case 'left': case 'right': path.style.fill='#a5f'; break;
case 'l1':case 'r1':case 'l2':case 'r2': path.style.fill='#5ff'; break;
case 'share':case 'option': path.style.fill='#f5f'; break;
}
path.style.stroke='#000';
return;
}

if(['ps','touch','mc'].includes(kn)) el.classList.add('img-pressed');
});
}
</script>
</body>
</html>
